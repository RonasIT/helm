{{- if .Values.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "laravel.fullname" . }}-route
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "laravel.labels" . | nindent 4 }}
spec:
  entryPoints:
    {{- range .Values.ingress.entryPoints }}
    - {{ . }}
    {{- end }}
  routes:
    {{- range .Values.ingress.hosts }}
    {{- $host := . }}
    {{- if kindIs "map" . }}
    {{- $host = .host }}
    {{- end }}
    - match: Host(`{{ $host }}`)
      kind: Rule
      middlewares:
        - name: {{ include "laravel.fullname" $ }}-forwarded-headers
        {{- if $.Values.ingress.ipAllowList.enabled }}
        - name: {{ include "laravel.fullname" $ }}-ip-allowlist
        {{- end }}
        {{- if $.Values.ingress.buffering.enabled }}
        - name: {{ include "laravel.fullname" $ }}-buffering
        {{- end }}
        {{- if $.Values.ingress.noindex.enabled }}
        - name: {{ include "laravel.fullname" $ }}-noindex
        {{- end }}
      services:
        - name: {{ include "laravel.fullname" $ }}
          port: {{ $.Values.service.port }}
    {{- end }}
  tls:
    certResolver: {{ .Values.ingress.tls.certResolver }}
{{- end }}