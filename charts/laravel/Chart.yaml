apiVersion: v2
appVersion: 1.16.0
description: A Helm chart for Kubernetes to deploy Laravel applications
name: laravel
type: application
version: 3.0.0
dependencies:
  # alias `postgresql`: values live under `postgresql.*`, service is <release>-postgresql
  - name: postgres
    alias: postgresql
    condition: postgresql.enabled
    repository: oci://registry-1.docker.io/cloudpirates
    version: 0.19.5
  - name: mariadb
    condition: mariadb.enabled
    repository: oci://registry-1.docker.io/cloudpirates
    version: 0.16.5
  - name: redis
    condition: redis.enabled
    repository: oci://registry-1.docker.io/cloudpirates
    version: 0.30.4
